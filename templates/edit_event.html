{% extends "base.html" %}

{% block title %}Edit Event - BudgetCrafter{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 600px; margin: 0 auto;">
    <h2 style="display: flex; align-items: center; gap: 12px;">
        <i class="fas fa-edit" style="color: var(--primary);"></i>
        Edit Event
    </h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Modify your event details and budget.</p>

    <form method="POST">
        <div class="form-group">
            <label>Event Name</label>
            <input name="name" class="form-control" value="{{ event[1] }}" required>
        </div>

        <div class="form-group">
            <label>Event Type</label>
            <input name="type" class="form-control" value="{{ event[2] }}" required>
        </div>

        <div class="form-group">
            <label>Total Budget (₹)</label>
            <input name="budget" type="number" class="form-control" value="{{ event[3] }}" required>
        </div>

        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary">Update Event</button>
            <a href="/dashboard" class="btn" style="background: rgba(255,255,255,0.05); color: white;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
