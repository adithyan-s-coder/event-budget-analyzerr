{% extends "base.html" %}

{% block title %}Edit Expense - BudgetCrafter{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 600px; margin: 0 auto;">
    <h2 style="display: flex; align-items: center; gap: 12px;">
        <i class="fas fa-edit" style="color: var(--primary);"></i>
        Edit Expense
    </h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Correct any errors in your spending logs.</p>

    <form method="POST">
        <div class="form-group">
            <label>Category</label>
            <input name="category" class="form-control" value="{{ exp[1] }}" required>
        </div>

        <div class="form-group">
            <label>Item Description</label>
            <input name="item" class="form-control" value="{{ exp[2] }}" required>
        </div>

        <div class="form-group">
            <label>Amount (₹)</label>
            <input name="amount" type="number" class="form-control" value="{{ exp[3] }}" required>
        </div>

        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary">Update Expense</button>
            <a href="/dashboard" class="btn" style="background: rgba(255,255,255,0.05); color: white;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
