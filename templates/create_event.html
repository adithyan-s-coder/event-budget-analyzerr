{% extends "base.html" %}

{% block title %}Create Event - BudgetCrafter{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 600px; margin: 0 auto;">
    <h2 style="display: flex; align-items: center; gap: 12px;">
        <i class="fas fa-plus-circle" style="color: var(--primary);"></i>
        Create New Event
    </h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Set your budget and event details to start tracking.</p>

    <form method="POST">
        <div class="form-group">
            <label>Event Name</label>
            <input name="event_name" class="form-control" placeholder="e.g. Annual Gala 2024" required>
        </div>

        <div class="form-group">
            <label>Event Type</label>
            <select name="event_type" class="form-control">
                <option value="Wedding">Wedding</option>
                <option value="Corporate">Corporate</option>
                <option value="Birthday">Birthday</option>
                <option value="Conference">Conference</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Total Budget (₹)</label>
            <input name="budget" type="number" class="form-control" placeholder="e.g. 50000" required>
        </div>

        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary">Create Event</button>
            <a href="/dashboard" class="btn" style="background: rgba(255,255,255,0.05); color: white;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
